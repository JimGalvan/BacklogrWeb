<app-auth-card
  title="Sign in"
  subtitle="Welcome back"
  [error]="error()"
  [success]="successMessage()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <app-auth-field
      label="Email"
      fieldId="email"
      type="email"
      placeholder="jane@example.com"
      autocomplete="email"
      [control]="form.controls.email"
    />
    <app-auth-field
      label="Password"
      fieldId="password"
      type="password"
      placeholder="········"
      autocomplete="current-password"
      [control]="form.controls.password"
    />
    <app-auth-submit-button label="Sign in" [loading]="loading()" />
  </form>

  <app-auth-switch
    prompt="Don't have an account?"
    linkText="Create one"
    link="/register"
  />
</app-auth-card>
