<div class="page">
  <div class="page-header">
    <h1 class="page-title">Integrations</h1>
    <p class="page-subtitle">Connect your issue trackers to import tickets into Backlogr.</p>
  </div>

  <div class="provider-list">
    @for (provider of providers; track provider.id) {
      <app-provider-card
        [provider]="provider"
        [connected]="isConnected(provider.id)"
        (connect)="connect(provider.id)"
      />
    }
  </div>

  <p class="read-only-note">Read-only access only. Backlogr never writes back to your tracker.</p>
</div>
