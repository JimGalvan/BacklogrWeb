<div class="detail-grid">
  <div class="main-col">
    <app-topbar (importClick)="showModal.set(true)" />
    <app-ticket-body [ticketKey]="ticketKey()" />
  </div>
  <app-insights-panel />
</div>

@if (showModal()) {
  <app-import-modal
    (close)="showModal.set(false)"
    (imported)="onImported()"
  />
}
