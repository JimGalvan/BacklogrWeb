<div class="page">
  <!-- Page header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Imported tickets</h1>
      <span class="ticket-count">{{ filteredTickets().length }}</span>
    </div>
    <button class="btn-import" (click)="showModal.set(true)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Import ticket
    </button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    @for (filter of statusFilters; track filter) {
      <button
        class="filter-btn"
        [class.active]="activeFilter() === filter"
        (click)="activeFilter.set(filter)"
      >{{ filter }}</button>
    }
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <!-- Table header -->
    <div class="table-header">
      <span>Priority</span>
      <span>Key</span>
      <span>Title</span>
      <span>Status</span>
      <span>Assignee</span>
      <span></span>
    </div>

    <!-- Rows -->
    @if (filteredTickets().length === 0) {
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted-2)">
          <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 5v14M8 5v14"/>
        </svg>
        <p>No tickets match this filter.</p>
      </div>
    } @else {
      @for (ticket of filteredTickets(); track ticket.key) {
        <app-ticket-row [ticket]="ticket" (remove)="removeTicket($event)" />
      }
    }
  </div>
</div>

@if (showModal()) {
  <app-import-modal
    (close)="showModal.set(false)"
    (imported)="onImported()"
  />
}
