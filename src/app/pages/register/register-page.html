<div class="auth-card">
  <div class="auth-logo">
    <span class="logo-mark">B</span>
    <span class="logo-text">Backlogr</span>
  </div>

  <div class="auth-header">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start tracking your backlog</p>
  </div>

  @if (error()) {
    <div class="error-banner">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <div class="field">
      <label class="field-label" for="email">Email</label>
      <div class="input-wrap" [class.invalid]="form.get('email')?.touched && form.get('email')?.invalid">
        <input
          id="email"
          type="email"
          formControlName="email"
          class="field-input"
          placeholder="jane@example.com"
          autocomplete="email"
        />
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="input-wrap" [class.invalid]="form.get('password')?.touched && form.get('password')?.invalid">
        <input
          id="password"
          type="password"
          formControlName="password"
          class="field-input"
          placeholder="Min. 8 characters"
          autocomplete="new-password"
        />
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="loading()">
      @if (loading()) {
        <span class="spinner"></span>
      }
      Create account
    </button>
  </form>

  <p class="auth-switch">
    Already have an account?
    <a routerLink="/login" class="auth-link">Sign in</a>
  </p>
</div>
