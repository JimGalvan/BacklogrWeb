<app-auth-card
  title="Create account"
  subtitle="Start tracking your backlog"
  [error]="error()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <app-auth-field
      label="Email"
      fieldId="email"
      type="email"
      placeholder="jane@example.com"
      autocomplete="email"
      [control]="form.controls.email"
    />
    <app-auth-field
      label="Password"
      fieldId="password"
      type="password"
      placeholder="Min. 8 characters"
      autocomplete="new-password"
      [control]="form.controls.password"
    />
    <app-auth-submit-button label="Create account" [loading]="loading()" />
  </form>

  <app-auth-switch
    prompt="Already have an account?"
    linkText="Sign in"
    link="/login"
  />
</app-auth-card>
