<div class="wt-layout">
  <app-wt-header
    [workspaces]="workspaces()"
    [workspaceId]="workspaceId()"
    [workspaceName]="selectedWorkspace()?.name || 'Workspace'"
    (workspaceChange)="selectWorkspace($event)"
    (importTicket)="showImport.set(true)"
  />

  <app-wt-toolbar
    [(mineOnly)]="mineOnly"
    [(search)]="search"
    [count]="filteredTickets().length"
  />

  <div class="wt-body">
    @if (loading()) {
      <div class="loading-state">Loading tickets…</div>
    } @else {
      <app-wt-table
        [tickets]="filteredTickets()"
        [workspaceId]="workspaceId()"
        [search]="search()"
        (remove)="askRemove($event)"
      />
    }
  </div>
</div>

<!-- Import modal -->
@if (showImport()) {
  <app-import-modal
    [workspaceId]="workspaceId()"
    (close)="showImport.set(false)"
    (imported)="onImported()"
  />
}

<!-- Remove confirm modal -->
@if (confirmRemove(); as ticket) {
  <app-confirm-dialog
    [title]="'Remove ' + ticket.ticketKey + '?'"
    message="This removes it from the workspace. It won't be deleted in the source tracker."
    icon="trash"
    confirmLabel="Remove"
    [danger]="true"
    [loading]="removeLoading()"
    (confirm)="confirmDoRemove()"
    (cancel)="confirmRemove.set(null)"
  />
}

<!-- Toast -->
<app-toast [toast]="toastService.toast()" />
