<header class="wt-header">
  <div class="crumbs">
    <a class="crumb-link" routerLink="/workspaces">Workspaces</a>
    <span class="crumb-sep">/</span>
    <a class="crumb-link" routerLink="/workspaces">{{ workspaceName() }}</a>
    <span class="crumb-sep">/</span>
    <span class="crumb-here">Tickets</span>
  </div>
  <div class="header-spacer"></div>
  <label class="workspace-picker">
    <span>Workspace</span>
    <select
      [value]="workspaceId()"
      [disabled]="workspaces().length === 0"
      (change)="onWorkspaceChange($event)"
    >
      @for (workspace of workspaces(); track workspace.id) {
        <option [value]="workspace.id">{{ workspace.name }}</option>
      }
    </select>
  </label>
  <button class="pill pill--primary" [disabled]="!workspaceId()" (click)="importTicket.emit()">
    <app-icon name="plus" [size]="13" />
    Import ticket
  </button>
</header>
