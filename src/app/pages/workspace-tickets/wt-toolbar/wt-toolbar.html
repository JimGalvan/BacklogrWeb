<div class="wt-toolbar">
  <div class="filter-tabs">
    <button class="tab-btn" [class.active]="!mineOnly()" (click)="mineOnly.set(false)">All tickets</button>
    <button class="tab-btn" [class.active]="mineOnly()" (click)="mineOnly.set(true)">Imported by me</button>
  </div>
  <div class="toolbar-spacer"></div>
  <div class="search-input">
    <app-icon name="search" [size]="13" [strokeWidth]="1.8" />
    <input [(ngModel)]="search" placeholder="Search tickets…" />
  </div>
  <span class="count-hint">{{ count() }}</span>
</div>
