<div class="app-grid">
  <!-- Left rail -->
  <app-left-rail />

  <!-- Main column -->
  <div class="main-col">
    <app-topbar (importClick)="showModal.set(true)" />
    <app-ticket-body />
  </div>

  <!-- Insights panel -->
  <app-insights-panel />
</div>

<!-- Import modal -->
@if (showModal()) {
  <app-import-modal
    (close)="showModal.set(false)"
    (imported)="onImported()"
  />
}
