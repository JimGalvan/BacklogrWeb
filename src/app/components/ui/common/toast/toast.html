@if (toast(); as t) {
  <div class="toast" [class.toast--err]="t.type === 'err'">
    <span class="toast-ico">
      @if (t.type === 'err') {
        <app-icon name="warning" [size]="11" />
      } @else {
        <app-icon name="check" [size]="11" [strokeWidth]="2.2" />
      }
    </span>
    <span>{{ t.msg }}</span>
  </div>
}
