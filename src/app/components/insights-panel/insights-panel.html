<div class="insights-panel">
  <!-- Header -->
  <div class="panel-header">
    <div class="header-title-row">
      <div class="sparkle-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
      <h2 class="panel-title">Insights</h2>
      <div class="spacer"></div>
      <div class="analyzing-indicator">
        <span class="live-dot"></span>
        <span class="live-text">analyzing live</span>
      </div>
    </div>

    <app-tool-tabs
      [activeTab]="activeTab()"
      (tabChange)="activeTab.set($event)"
    />
  </div>

  <!-- Body -->
  <div class="panel-body">
    @if (insights(); as data) {
      <div class="summary-card">
        <!-- Card head -->
        <div class="card-head">
          <div class="card-icon">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <h3 class="card-title">TL;DR</h3>
          <div class="spacer"></div>
          <span class="card-meta">{{ data.model }} · {{ data.latency }}</span>
        </div>

        <!-- TL;DR quote -->
        <div class="tldr-block">
          @if (isDone()) {
            <div class="tldr-markdown" [innerHTML]="tldrHtml() | safeHtml" (click)="onTldrClick($event)"></div>
          } @else {
            <blockquote class="tldr-quote">
              {{ streamedText() }}<span class="caret"></span>
            </blockquote>
          }
        </div>

      </div>
    }
  </div>

  <!-- Footer -->
  <div class="panel-footer">
    <div class="footer-left">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span class="footer-meta">ticketlens · context window {{ insights()?.contextTokens }}</span>
    </div>
    <button class="reanalyze-btn" (click)="startStream()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Re-analyze
    </button>
  </div>
</div>
