<!--TODO: decompose this into smaller components-->
<nav class="rail">
  <!-- Logo -->
  <a class="logo" routerLink="/tickets">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="2.2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/>
      <circle cx="11" cy="11" r="2.5" fill="rgba(255,255,255,0.92)" stroke="none"/>
      <line x1="17" y1="17" x2="21.5" y2="21.5"/>
    </svg>
  </a>

  <!-- Primary nav -->
  <div class="nav-group">
    <a class="nav-btn" routerLink="/tickets" routerLinkActive="active" title="Tickets">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <path d="M16 5v14M8 5v14"/>
      </svg>
    </a>
    <a class="nav-btn" routerLink="/integrations" routerLinkActive="active" title="Integrations">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </a>
    <a class="nav-btn" routerLink="/sources" routerLinkActive="active" title="Sources">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 7.5 12 3l8 4.5-8 4.5-8-4.5Z"/>
        <path d="m4 12 8 4.5 8-4.5M4 16.5 12 21l8-4.5"/>
      </svg>
    </a>
    <a class="nav-btn" routerLink="/workspaces" routerLinkActive="active" title="Workspaces">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="8" r="3.5"/>
        <path d="M2 21a7 7 0 0 1 14 0"/>
        <circle cx="17" cy="7" r="2.8"/>
        <path d="M16 14a6 6 0 0 1 6 6"/>
      </svg>
    </a>
  </div>

  <div class="spacer"></div>

  <!-- Account -->
  <div class="account">
    <button
      class="user-avatar"
      type="button"
      title="Your account"
      aria-haspopup="menu"
      [attr.aria-expanded]="menuOpen()"
      (click)="toggleMenu($event)">
      {{ initials() }}
    </button>

    @if (menuOpen()) {
      <div class="account-menu" role="menu" (click)="$event.stopPropagation()">
        <div class="account-menu__label">Signed in as</div>
        <div class="account-menu__email" [title]="email()">{{ email() || 'Unknown account' }}</div>
        <button class="account-menu__item account-menu__item--danger" type="button" role="menuitem" (click)="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>
    }
  </div>
</nav>
