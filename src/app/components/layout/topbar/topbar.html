<header class="topbar">
  <nav class="breadcrumbs" aria-label="Ticket location">
    <span class="crumb-project">{{ ticket()?.projectKey || 'Tickets' }}</span>
    @if (ticket()?.ticketKey; as ticketKey) {
      <span class="crumb-sep">/</span>
      <span class="crumb-key">{{ ticketKey }}</span>
    }
  </nav>

  <div class="spacer"></div>

  @if (ticket()?.externalUrl; as externalUrl) {
    <a class="pill-btn ghost" [href]="externalUrl" target="_blank" rel="noopener noreferrer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      View in {{ providerName() }}
    </a>
  }
</header>
