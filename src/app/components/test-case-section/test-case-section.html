@if (testCases().length) {
  <div class="refinement-section">
    <h4 class="refinement-section-title">{{ title() }}</h4>
    <ul class="refinement-items">
      @for (testCase of testCases(); track testCase.id) {
        <li class="refinement-item">
          <div class="test-case-head">
            <span class="test-case-id">{{ testCase.id }}</span>
            <span class="item-title">{{ testCase.scenario }}</span>
          </div>
          <span class="test-case-risk">Expected outcome: {{ testCase.expectedOutcome }}</span>
          <span class="test-case-risk">Risk: {{ testCase.riskCovered }}</span>
        </li>
      }
    </ul>
  </div>
}
