<div class="row">
  <div class="col-priority">
    <app-priority-chip [priority]="ticket().priority" />
  </div>

  <div class="col-key">
    <span class="key">{{ ticket().key }}</span>
    <span class="project">{{ ticket().project }}</span>
  </div>

  <div class="col-title">
    <span class="title">{{ ticket().title }}</span>
  </div>

  <div class="col-status">
    <app-status-chip [status]="ticket().status" />
  </div>

  <div class="col-assignee">
    <app-avatar
      [initials]="ticket().assignee.avatar.initials"
      [variant]="ticket().assignee.avatar.variant"
      [size]="20"
    />
    <span class="assignee-name">{{ ticket().assignee.name }}</span>
  </div>

  <div class="col-actions">
    <a class="btn-view" [routerLink]="['/tickets', ticket().key]">
      View
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
    <button class="btn-remove" (click)="remove.emit(ticket().key)" title="Remove ticket">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>
