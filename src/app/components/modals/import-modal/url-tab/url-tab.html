<div class="input-wrapper">
  <app-icon name="link" [size]="14" [strokeWidth]="1.8" class="input-icon" />
  <input
    class="url-input"
    type="url"
    placeholder="https://acme.atlassian.net/browse/PAY-4827"
    [value]="url()"
    (input)="onInput($event)"
    (keydown.enter)="importTicket.emit(undefined)"
  />
</div>
<p class="input-hint">⌘V · accepts Jira</p>
