<app-modal-shell (dismiss)="close.emit()">
  <!-- Head -->
  <div class="modal-head">
    <h3 class="modal-heading">Import a ticket</h3>
    <p class="modal-subheading">Paste a link, connect an integration, or pick from recents.</p>
  </div>

  <!-- Tab strip -->
  <div class="modal-tabs">
    <button
      class="modal-tab"
      [class.active]="activeTab() === 'url'"
      (click)="activeTab.set('url')"
    >Paste URL</button>
    <button
      class="modal-tab"
      [class.active]="activeTab() === 'connect'"
      (click)="activeTab.set('connect')"
    >Connect integration</button>
  </div>

  <!-- Body -->
  <div class="modal-body">
    @if (activeTab() === 'url') {
      <app-import-url-tab [(url)]="urlValue" (importTicket)="importFromUrl($event)" />
    }
    @if (activeTab() === 'connect') {
      <app-import-connect-tab />
    }
  </div>

  <!-- Error message -->
  @if (errorMessage()) {
    <div class="error-message">
      {{ errorMessage() }}
      @if (showConnectHint()) {
        <button class="error-connect-link" (click)="activeTab.set('connect')">Connect an integration →</button>
      }
    </div>
  }

  <!-- Footer -->
  <div class="modal-footer">
    <span class="footer-hint">⌥ Enter to import</span>
    <div class="spacer"></div>
    <div class="footer-actions">
      <button class="btn-cancel" (click)="close.emit()">Cancel</button>
      <button
        class="btn-import"
        [disabled]="!urlValue() || isLoading()"
        (click)="importFromUrl()"
      >
        @if (isLoading()) {
          <span class="spinner"></span>
          Importing…
        } @else {
          Import ticket
        }
      </button>
    </div>
  </div>
</app-modal-shell>
