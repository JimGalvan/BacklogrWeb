<app-ai-stream-card
  title="TL;DR"
  idleText="Generate a concise summary of this ticket, its comments, and any selected source context."
  runLabel="Generate TL;DR"
  [isStreaming]="isStreaming()"
  [isDone]="isDone()"
  [isError]="isError()"
  [errorMessage]="errorMessage()"
  [hasContent]="!!streamedText()"
  (run)="reanalyze()"
>
  <app-icon idleIcon name="document" [size]="18" [strokeWidth]="1.5" />
  <app-icon headIcon name="document" [size]="11" />

  @if (!isError() && (isStreaming() || isDone())) {
    <p class="tldr-scope">Based on this ticket and its selected source context.</p>
    <div class="tldr-block" aria-live="polite">
      @if (isDone()) {
        <div class="tldr-markdown" [innerHTML]="tldrHtml() | safeHtml" (click)="onTldrClick($event)"></div>
      } @else {
        <blockquote class="tldr-quote">
          {{ streamedText() }}<span class="caret"></span>
        </blockquote>
      }
    </div>
  }
</app-ai-stream-card>
