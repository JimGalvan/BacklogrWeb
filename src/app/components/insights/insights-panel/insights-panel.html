<div class="insights-panel">
  <app-panel-header
    [activeTab]="activeTab()"
    (tabChange)="selectTab($event)"
  />

  <app-source-context-bar [workspaceId]="workspaceId()" [ticketKey]="ticketKey()" />

  <!-- Body: tabs stay mounted so generated analysis survives tab switches -->
  <div class="panel-body">
    <app-summary-tab
      [hidden]="activeTab() !== 'summary'"
      [workspaceId]="workspaceId()"
      [ticketKey]="ticketKey()"
    />
    <app-refinement-tab
      [hidden]="activeTab() !== 'refinement'"
      [workspaceId]="workspaceId()"
      [ticketKey]="ticketKey()"
      (openSource)="openSourceInRelevantFiles($event)"
    />
    <app-relevant-files-tab
      [hidden]="activeTab() !== 'files'"
      [workspaceId]="workspaceId()"
      [ticketKey]="ticketKey()"
    />
  </div>

  <app-panel-footer
    [actionLabel]="footerActionLabel()"
    (reanalyze)="this.reanalyze()"
  />
</div>
